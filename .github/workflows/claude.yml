name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Skip draft PRs
    if: github.event.pull_request.draft == false

    steps:
      # Step 1: Checkout the repository with full history
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Step 2: Get the last commit SHA from the PR
      - name: PR Review
        uses: anthropics/claude-action@v1
        wait:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          promt: |
            REPO: ${{ github.repository }}
            PR: ${{ github.event.pull_request.number }}
            
            You are a senior software engineer and code reviewer. 
            Please review the following code changes in this pull request and provide a detailed review. 
            Focus on code quality, maintainability, performance, security, and adherence to best practices. 
            Provide constructive feedback and suggestions for improvement.

          claude_args: |  
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

